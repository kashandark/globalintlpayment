
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global International Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',

          extend: {

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6; /* Consistent with dashboard background */
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Web UI Page Separation */
        .invoice-preview-mode .printable-page {
            margin-bottom: 60px !important;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3) !important;
            border: 1px solid #e2e8f0 !important;
        }

        /* Essential Print Overrides */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            body, html {
                height: auto !important;
                background: white !important;
                width: 210mm !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* Absolute isolation for the printing target */
            #root > * {
                display: none !important;
            }

            #root .invoice-printable-target {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important;
                z-index: 9999999 !important;
                transform: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .no-print {
                display: none !important;
                height: 0 !important;
                width: 0 !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            .printable-page {
                display: block !important;
                width: 210mm !important;
                height: 297mm !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                position: relative !important;
                overflow: hidden !important;
                box-shadow: none !important;
                border: none !important;
            }

            /* Ensure the last page doesn't create a trailing blank */
            .printable-page:last-child {
                page-break-after: auto !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
